name: DTC Dashboard — CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          pip install -r requirements.txt

      - name: Create dummy .env
        run: |
          cat > .env << ENVEOF
          DB_HOST=localhost
          DB_NAME=dtc_db
          DB_USER=root
          DB_PASSWORD=ci_dummy
          DB_PORT=3306
          DB_POOL_NAME=dtc_pool
          DB_POOL_SIZE=5
          APP_TITLE=DTC Dashboard
          APP_DEBUG=false
          JOB1_PATH=jobs/job1.exe
          JOB1_LABEL=Job 1
          JOB2_PATH=jobs/job2.exe
          JOB2_LABEL=Job 2
          CONTROL_PASSWORD=ci_dummy
          ENVEOF

      - name: Lint erreurs bloquantes
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=venv,.venv,__pycache__,jobs

      - name: Lint avertissements style
        run: |
          flake8 . --count --exit-zero --max-line-length=127 \
            --max-complexity=10 --statistics \
            --exclude=venv,.venv,__pycache__,jobs

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
        continue-on-error: true
